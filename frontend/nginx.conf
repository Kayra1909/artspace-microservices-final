server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # API calls use relative URLs in the prod build (VITE_API_URL="") and are
    # proxied here to the gateway over the internal Docker network. This keeps the
    # Docker frontend talking to the Docker gateway/services/postgres only, with no
    # dependency on host port 5092. Local dev (Vite :5173) bypasses nginx entirely
    # and hits http://localhost:5092 directly via .env.
    location /api/ {
        proxy_pass http://api-gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
