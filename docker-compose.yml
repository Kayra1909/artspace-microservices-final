services:
  postgres:
    # Built from postgres/Dockerfile, which bakes init-db.sh (the per-service DB
    # creator) into the image. It used to be bind-mounted, but that fails on
    # Docker Desktop for macOS (noexec file-share → "bad interpreter: Permission
    # denied" on first init). The build context is the repo root so the Dockerfile
    # can COPY init-db.sh.
    build:
      context: .
      dockerfile: postgres/Dockerfile
    container_name: artspace-postgres
    environment:
      POSTGRES_PASSWORD: artspace123
    ports:
      - "5432:5432"
    volumes:
      # PG18's data dir is /var/lib/postgresql/18/docker; mounting the whole
      # /var/lib/postgresql captures it regardless of the versioned subpath, so
      # data survives container recreation. (The old /var/lib/postgresql/17 mount
      # pointed at an empty path, so nothing was ever persisted.)
      - postgres_data:/var/lib/postgresql

  rabbitmq:
    image: rabbitmq:management
    container_name: artspace-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  auth-service:
    build: ./AuthService
    restart: on-failure
    ports:
      - "5144:8080"
    depends_on:
      - postgres
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=authdb;Username=postgres;Password=artspace123
      - Jwt__Secret=artspace_super_secret_key_123456789_must_be_long
      - Jwt__Issuer=artspace
      - Jwt__Audience=artspace

  art-service:
    build: ./ArtService
    restart: on-failure
    ports:
      - "5280:8080"
    depends_on:
      - postgres
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=artdb;Username=postgres;Password=artspace123
      - Jwt__Secret=artspace_super_secret_key_123456789_must_be_long
      - Jwt__Issuer=artspace
      - Jwt__Audience=artspace

  comment-service:
    build: ./CommentService
    restart: on-failure
    ports:
      - "5285:8080"
    depends_on:
      - postgres
      - rabbitmq
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=commentdb;Username=postgres;Password=artspace123
      - Jwt__Secret=artspace_super_secret_key_123456789_must_be_long
      - Jwt__Issuer=artspace
      - Jwt__Audience=artspace

  notification-service:
    build: ./NotificationService
    restart: on-failure
    ports:
      - "5012:8080"
    depends_on:
      - postgres
      - rabbitmq
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=notificationdb;Username=postgres;Password=artspace123
      - Jwt__Secret=artspace_super_secret_key_123456789_must_be_long
      - Jwt__Issuer=artspace
      - Jwt__Audience=artspace

  request-service:
    build: ./RequestService
    restart: on-failure
    ports:
      - "5015:8080"
    depends_on:
      - postgres
      - rabbitmq
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=requestdb;Username=postgres;Password=artspace123
      - Jwt__Secret=artspace_super_secret_key_123456789_must_be_long
      - Jwt__Issuer=artspace
      - Jwt__Audience=artspace

  api-gateway:
    build: ./ApiGateway/ApiGateway
    restart: on-failure
    ports:
      - "5092:8080"
    depends_on:
      - auth-service
      - art-service
      - comment-service
      - notification-service
      - request-service

  frontend:
    build:
      context: ./frontend
      args:
        VITE_APP_ENV: prod
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

volumes:
  postgres_data:
